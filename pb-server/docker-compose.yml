services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pulse_board_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: valkey/valkey
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
